<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>upload books - WeBook</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/upload_book.css') }}">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Upload Book</h1>
            <div class="header-buttons">
                <button class="back-btn" onclick="goBack()">← Back</button>
                <a href="{{ url_for('homepage') }}" class="homepage-btn">🏠 Homepage</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="upload-card">
            <div class="card-header">
                <h2>Upload Book Details</h2>
                <p>Fill in the book information and upload a cover image</p>
            </div>
            
            <div class="card-body">
                <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data" class="upload-form">
                    <div class="form-group">
                        <label for="name">Book Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter book name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" id="price" name="price" placeholder="Enter price" step="0.01" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="description">Description</label>
                        <input type="text" id="description" name="description" placeholder="Enter book description">
                    </div>
                    
                    <div class="form-group">
                        <label for="degree_of_wear">Degree of Wear</label>
                        <input type="text" id="degree_of_wear" name="degree_of_wear" placeholder="e.g., New, Like New, Good">
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="seller_contact">Seller Contact</label>
                        <input type="text" id="seller_contact" name="seller_contact" placeholder="e.g., phone number or WeChat">
                    </div>
                    
                    <div class="image-upload" onclick="document.getElementById('image').click();">
                        <input type="file" id="image" name="image" accept="image/*">
                        <div class="upload-icon">📷</div>
                        <div class="upload-text">Click to upload book cover</div>
                        <div class="upload-hint">Supported formats: JPG, PNG, GIF</div>
                        <div id="preview"></div>
                    </div>
                    
                    <button type="submit" class="submit-btn">Upload Book</button>
                </form>
            </div>
        </div>
    </div>
        
        <script>
            function goBack() {
                window.history.back();
            }

            (function() {
                var input = document.getElementById('image');
                if (!input) return;
                input.addEventListener('change', function(event) {
                    const file = event.target.files && event.target.files[0];
                    if (file && file.type && file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const preview = document.getElementById('preview');
                            if (preview) {
                                preview.innerHTML = '<img src="' + e.target.result + '" alt="Book Image Preview" style="max-width: 100%; height: auto;" />';
                            }
                        };
                        reader.readAsDataURL(file);
                    } else {
                        alert('Please select a valid image file.');
                    }
                });
            })();
        </script>
</body>
</html>
